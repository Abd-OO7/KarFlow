<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; }
        .header { background: #e67e22; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .highlight { background: #fef5e7; border-left: 4px solid #e67e22; padding: 12px; margin: 15px 0; }
        .footer { background: #f5f5f5; padding: 15px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>KarFlow</h1>
        <p>Rappel de retour</p>
    </div>
    <div class="content">
        <p>Bonjour <span th:text="${clientName}">Client</span>,</p>
        <div class="highlight">
            <p>Votre location du véhicule <strong th:text="${vehicleInfo}">AB-123-CD</strong>
            arrive à échéance le <strong th:text="${endDate}">2026-03-22</strong>.</p>
        </div>
        <p>Merci de prévoir le retour du véhicule avant cette date pour éviter des frais supplémentaires.</p>
        <p>L'équipe KarFlow</p>
    </div>
    <div class="footer">
        <p>Ce message a été envoyé automatiquement par KarFlow.</p>
    </div>
</body>
</html>
