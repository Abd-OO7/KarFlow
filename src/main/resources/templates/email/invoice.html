<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; }
        .header { background: #1e3a5f; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .amount { font-size: 24px; font-weight: bold; color: #1e3a5f; }
        .footer { background: #f5f5f5; padding: 15px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>KarFlow</h1>
    </div>
    <div class="content">
        <p>Bonjour <span th:text="${clientName}">Client</span>,</p>
        <p>Veuillez trouver ci-joint votre facture <strong th:text="${invoiceNumber}">INV-2026-00001</strong>.</p>
        <p>Montant total : <span class="amount" th:text="${totalAmount} + ' MAD'">0.00 MAD</span></p>
        <p>Date d'échéance : <span th:text="${dueDate}">N/A</span></p>
        <p>Merci pour votre confiance.</p>
        <p>L'équipe KarFlow</p>
    </div>
    <div class="footer">
        <p>Ce message a été envoyé automatiquement par KarFlow. Merci de ne pas y répondre.</p>
    </div>
</body>
</html>
